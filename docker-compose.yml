services:

  nginx:
    image: nginx:latest
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf
    depends_on:
      - frontend
      - backend

  frontend:
    build: ./quicksedd
    ports:
      - "8080:80"
      

  backend:
    build: ./backquickseed
    ports:
      - "8000:8000"
    env_file:
      - ./backquickseed/.env
    depends_on:
      db:
        condition: service_healthy
    restart: always

  db:
    image: mysql:8
    environment:
      MYSQL_DATABASE: quickseed
      MYSQL_USER: quickseed_user
      MYSQL_PASSWORD: QuickSeed!2026
      MYSQL_ROOT_PASSWORD: root
    ports:
      - "3306:3306"
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 5s
      timeout: 5s
      retries: 10